<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🩺 Diabetes Prediction</h1>

    <form id="form">
        <input type="number" placeholder="Pregnancies" required>
        <input type="number" placeholder="Glucose" required>
        <input type="number" placeholder="Blood Pressure" required>
        <input type="number" placeholder="Skin Thickness" required>
        <input type="number" placeholder="Insulin" required>
        <input type="number" placeholder="BMI" step="any" required>
        <input type="number" placeholder="Diabetes Pedigree" step="any" required>
        <input type="number" placeholder="Age" required>

        <button type="submit">Predict</button>
    </form>

    <h2 id="result"></h2>
    <h3 id="confidence"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
